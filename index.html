<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1998-2026 动画生涯个人表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .content-wrapper { padding-top: 100px; }

        /* 基础卡片样式 */
        .anime-card {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            filter: grayscale(100%) brightness(0.4);
            opacity: 0.7;
            display: flex;
            flex-direction: column;
        }
        
        .anime-card.active {
            filter: grayscale(0%) brightness(1);
            opacity: 1;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.4);
        }

        /* 粘性标题 */
        .year-header {
            position: sticky;
            top: 72px; 
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            z-index: 30;
            padding: 0.75rem 0;
            border-bottom: 1px solid #1e293b;
        }

        /* 标题常驻显示：平时模式 */
        .anime-title {
            font-size: 0.75rem;
            line-height: 1.1;
            padding: 4px;
            text-align: center;
            background: rgba(0,0,0,0.6);
            width: 100%;
            /* 平时限制两行 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-active { background-color: #ec4899 !important; color: white !important; }

        /* --- 核心：导出专用样式补丁 --- */
        /* 强制 10 列小图布局 */
        .export-small-active .anime-grid {
            grid-template-columns: repeat(10, minmax(0, 1fr)) !important;
            gap: 6px !important;
        }
        /* 导出时文本显示完整 */
        .export-small-active .anime-title {
            -webkit-line-clamp: unset !important; /* 取消行数限制 */
            display: block !important;
            overflow: visible !important;
            font-size: 10px !important; /* 强制较小但清晰的字体 */
            word-break: break-all;
            background: #1e293b; /* 导出时使用实色背景，防止文字重叠 */
        }
        /* 导出时取消粘性定位，防止错位 */
        .export-small-active .year-header { position: static !important; }

        .size-small .anime-grid { grid-template-columns: repeat(8, minmax(0, 1fr)); }
        .size-medium .anime-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
        .size-large .anime-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }

        @media (max-width: 640px) {
            .size-small .anime-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
            .size-medium .anime-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
            .size-large .anime-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-xl border-b border-slate-800 shadow-2xl">
        <div class="max-w-7xl mx-auto px-3 py-2 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="flex flex-col">
                    <span class="text-[8px] uppercase text-slate-500 font-bold">看过</span>
                    <span class="text-xl font-mono font-black text-white" id="stats-count">0</span>
                </div>
                <div id="rank-container" class="rank-badge px-3 py-1 rounded-lg border font-black italic text-xs md:text-sm">-</div>
            </div>

            <div class="hidden sm:flex items-center bg-slate-800/50 p-1 rounded-xl border border-slate-700">
                <button onclick="changeSize('small')" id="btn-small" class="px-3 py-1 text-[10px] rounded-lg transition">小</button>
                <button onclick="changeSize('medium')" id="btn-medium" class="px-3 py-1 text-[10px] rounded-lg btn-active transition">中</button>
                <button onclick="changeSize('large')" id="btn-large" class="px-3 py-1 text-[10px] rounded-lg transition">大</button>
            </div>

            <div class="flex items-center gap-2">
                <button onclick="saveWatchedOnly()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-2 rounded-xl font-bold text-xs">清单导出</button>
                <button onclick="saveFullImage()" id="export-btn" class="flex items-center gap-1 bg-pink-600 hover:bg-pink-500 text-white px-3 py-2 rounded-xl font-bold text-xs transition">
                    <span>全量导出</span>
                    <div id="loader" class="hidden animate-spin h-3 w-3 border-2 border-white border-t-transparent rounded-full"></div>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto content-wrapper">
        <div id="capture-area" class="bg-[#0f172a] p-4 rounded-3xl">
            <!-- 导出水印 -->
            <div id="export-watermark" class="hidden flex justify-between items-center mb-8 border-b border-slate-800 pb-6">
                <h2 class="text-3xl font-black italic text-pink-500">动画番剧资历清单</h2>
                <div class="text-right">
                    <p id="export-rank-text" class="text-xl font-black italic text-white"></p>
                    <p class="text-slate-500 text-[10px]">Total Watched: <span id="export-count-text"></span></p>
                </div>
            </div>

            <div id="main-list" class="space-y-10"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'anime_watched_list_v5';
        let watchedIds = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let currentSize = 'medium';

        async function init() {
            try {
                const response = await fetch('anime_data.json');
                const data = await response.json();
                const container = document.getElementById('main-list');
                
                data.forEach(yearGroup => {
                    const section = document.createElement('section');
                    section.className = `year-section ${currentSize === 'small' ? 'size-small' : currentSize === 'large' ? 'size-large' : 'size-medium'}`;
                    section.innerHTML = `
                        <div class="year-header">
                            <h2 class="text-2xl font-black italic tracking-tighter"><span class="text-pink-500">#</span> ${yearGroup.year}</h2>
                        </div>
                        <div class="anime-grid grid mt-4">
                            ${yearGroup.animes.map(anime => renderCard(anime)).join('')}
                        </div>
                    `;
                    container.appendChild(section);
                });
                updateStats();
            } catch (err) { console.error(err); }
        }

        function renderCard(anime) {
            const isWatched = watchedIds.includes(anime.id);
            return `
                <div class="anime-card ${isWatched ? 'active' : ''}" onclick="toggleLit(${anime.id}, this)">
                    <div class="aspect-[3/4.2] overflow-hidden rounded-t-lg bg-slate-800">
                        <img src="${anime.cover}" class="w-full h-full object-cover" loading="lazy" crossorigin="anonymous">
                    </div>
                    <div class="anime-title text-white rounded-b-lg font-medium">${anime.title}</div>
                </div>
            `;
        }

        function toggleLit(id, el) {
            const idx = watchedIds.indexOf(id);
            if (idx > -1) { watchedIds.splice(idx, 1); el.classList.remove('active'); } 
            else { watchedIds.push(id); el.classList.add('active'); }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(watchedIds));
            updateStats();
        }

        function updateStats() {
            const count = watchedIds.length;
            document.getElementById('stats-count').innerText = count;
            document.getElementById('export-count-text').innerText = count;
            const rank = (count <= 50) ? {l:"拉完了",c:"text-slate-400"} : (count <= 200) ? {l:"NPC",c:"text-blue-400"} : (count <= 300) ? {l:"人上人",c:"text-yellow-400"} : (count <= 500) ? {l:"顶级",c:"text-purple-400"} : {l:"夯",c:"text-red-500"};
            const rankEl = document.getElementById('rank-container');
            rankEl.innerText = rank.l; rankEl.className = `rank-badge px-3 py-1 rounded-lg border font-black italic text-xs ${rank.c}`;
            document.getElementById('export-rank-text').innerText = rank.l;
            document.getElementById('export-rank-text').className = `text-xl font-black italic ${rank.c}`;
        }

        function changeSize(size) {
            currentSize = size;
            ['small', 'medium', 'large'].forEach(s => document.getElementById(`btn-${s}`).classList.toggle('btn-active', s === size));
            document.querySelectorAll('.year-section').forEach(s => {
                s.classList.remove('size-small', 'size-medium', 'size-large');
                s.classList.add(`size-${size}`);
            });
        }

        // --- 功能：全量导出（强制小尺寸 + 文本完整） ---
        async function saveFullImage() {
            const btn = document.getElementById('export-btn');
            const area = document.getElementById('capture-area');
            btn.disabled = true;
            document.getElementById('loader').classList.remove('hidden');
            
            // 记录未点亮图片以便恢复
            const unlitImages = [];
            document.querySelectorAll('.anime-card').forEach(card => {
                if (!card.classList.contains('active')) {
                    const img = card.querySelector('img');
                    unlitImages.push(img);
                    img.style.visibility = 'hidden';
                }
            });

            // 1. 开启导出模式（CSS将强制 10 列并展开文字）
            area.classList.add('export-small-active');
            document.getElementById('export-watermark').classList.remove('hidden');

            try {
                const canvas = await html2canvas(area, {
                    useCORS: true,
                    backgroundColor: '#0f172a',
                    scale: 1.2, // 稍微降低倍率提高成功率
                    windowWidth: 1400 
                });
                const link = document.createElement('a');
                link.download = `Full_Archive_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png', 0.8);
                link.click();
            } finally {
                // 还原
                area.classList.remove('export-small-active');
                unlitImages.forEach(img => img.style.visibility = 'visible');
                document.getElementById('export-watermark').classList.add('hidden');
                btn.disabled = false;
                document.getElementById('loader').classList.add('hidden');
            }
        }

        // --- 功能：清单导出（强制小尺寸 + 文本完整） ---
        async function saveWatchedOnly() {
            const watchedCards = document.querySelectorAll('.anime-card.active');
            if (watchedCards.length === 0) return alert("空空如也~");

            const tempDiv = document.createElement('div');
            tempDiv.className = "bg-[#0f172a] p-8 rounded-3xl export-small-active"; // 同样应用强制样式
            tempDiv.style.width = "1200px";
            tempDiv.style.position = "absolute";
            tempDiv.style.left = "-9999px";

            const header = document.getElementById('export-watermark').cloneNode(true);
            header.classList.remove('hidden');
            tempDiv.appendChild(header);

            const grid = document.createElement('div');
            grid.className = "anime-grid grid grid-cols-10 gap-2 mt-4"; // 强制 10 列
            watchedCards.forEach(card => {
                const clone = card.cloneNode(true);
                clone.style.filter = "none";
                clone.style.opacity = "1";
                grid.appendChild(clone);
            });
            tempDiv.appendChild(grid);
            document.body.appendChild(tempDiv);

            try {
                const canvas = await html2canvas(tempDiv, { useCORS: true, scale: 1.5 });
                const link = document.createElement('a');
                link.download = `Watched_List_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } finally {
                document.body.removeChild(tempDiv);
            }
        }

        init();
    </script>
</body>
</html>
